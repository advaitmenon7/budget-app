<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-18" />
    <title>Mortgage</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/budget.css') }}">
</head>
<body style="background-color:lightgrey;">
    <div class="box">
        <div class="centered-text">
            <p style="color:rgb(255, 255, 255); font-size: 39px;">Mortgage
                 
            </p>
<!-- NAVIGATION (separate, NOT inside form) -->
<div class="button-container">
        <form action="{{ url_for('show_budget') }}" method="POST">
        <button style="border: none; outline: none; color:rgb(3, 9, 113);" type="submit">Budget</button>
    </form>
<form action="{{ url_for('show_simple') }}" method="POST">
        <button style="border: none; outline: none; color:rgb(3, 9, 113);" type="submit">Savings Calculator (Simple)</button>
    </form>
    <form action="{{ url_for('show_goals') }}" method="POST">
        <button style="border: none; outline: none; color:rgb(3, 9, 113);" type="submit">Savings Calculator (Compound)</button>
    </form>
    <form action="{{ url_for('show_mortgage') }}" method="POST">
        <button style="border: none; outline: none; color:rgb(3, 9, 113);" type="submit">▶ Mortgage Calculator</button>
    </form>

</div>

<br>

<!-- ✅ MAIN FORM (ONLY ONE) -->
<form action="{{ url_for('handle_mata') }}" method="POST">                   <br>
<div class="wox">
<div class="wigbox">
<br>
    <div class="wontainer">

        <div class="gox">
            <label>House Price:</label>
            <br>
            <br>
            <label>Initial Deposit:</label>
            <br>
            <br>
            <label>Time:</label>
            <br>
            <br>
            <label>Annual Interest Rate (Compound):</label>
            <br>
            <br>

           </div>
        <div class="gox">
             <input type="number" id="hprice" name="hprice" min="0" step="0.01" class="large-input" value="{{ hprice }}">
             <label>CAD</label>
            <br>
            <br>
            <input type="number" id="dpayment" name="dpayment" min="0" step="0.01" class="large-input" value="{{ dpayment }}">
             <label>CAD</label>
            <br>

            <br>
            <input type="number" id="years" name="years" min="0" step="0.01" class="large-input" value="{{ years }}"> years
            <br>
            <br>
            <input type="number" id="rate" name="rate" min="0" step="0.01" max="100" class="large-input" value="{{ rate }}">
             <label>%</label>
            <br>

            <br>


</div>
    </div>
<div class="wox">
    <div class="bluetangle">
                <button style="background-color: rgb(3, 19, 113); border-color: rgb(3, 19, 113); color: rgb(255, 255, 255); width: 200px; height: 60px; font-size: 20px;"type="submit">Submit</button>
</div>
        </div>
</div>


<div class = "blank"></div>

                    <br>
                       <br>
<div class="bboxp3">
                <p style="color:rgb(0, 0, 0);">Estimate how how much each payment for your mortgage is.</p>
                    <div class="bluetangle"> 
            <p style="color:rgb(255, 255, 255);">For {{years}} years, you will pay: <br> {{pamount}} CAD each month.</p></div></div>

</div>


</div>

</div>
</body>
</html>
