<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-18" />
    <title>Savings Calculator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/budget.css') }}">
</head>
<body style="background-color:lightgrey;">
    <div class="box">
        <div class="centered-text">
            <p style="color:rgb(255, 255, 255); font-size: 39px;">Savings Calculator (Compound Interest)
                 
            </p>
<!-- NAVIGATION (separate, NOT inside form) -->
<div class="button-container">

    <form action="{{ url_for('show_budget') }}" method="POST">
        <button style="border: none; outline: none; color:rgb(3, 9, 113);" type="submit">Budget</button>
    </form>
<form action="{{ url_for('show_simple') }}" method="POST">
        <button style="border: none; outline: none; color:rgb(3, 9, 113);" type="submit">Savings Calculator (Simple)</button>
    </form>
    <form action="{{ url_for('show_goals') }}" method="POST">
        <button style="border: none; outline: none; color:rgb(3, 9, 113);" type="submit">▶ Savings Calculator (Compound)</button>
    </form>
    <form action="{{ url_for('show_mortgage') }}" method="POST">
        <button style="border: none; outline: none; color:rgb(3, 9, 113);" type="submit">Mortgage Calculator</button>
    </form>


</div>

<br>

<!-- ✅ MAIN FORM (ONLY ONE) -->
<form action="{{ url_for('handle_gata') }}" method="POST">                   <br>

<div class="wox">
<div class="wigbox">
<br>
    <div class="wontainer">

        <div class="gox">
            <label>Deposit Amount:</label>
            <br>
            <br>
            <label>Interest Application Freqeuncy</label>
            <br>
            <br>
            <label>Interest Rate (Compound):</label>
            <br>
            <br>
            <label>Time for Saving:</label>
           </div>
        <div class="gox">
            <input type="number" id="initial" name="initial" min="0" step="0.01" class="large-input" value="{{ initial }}">
            <label>CAD</label>
            <br>
            <br>
            <input type="radio" name="drate" value="12"
    {% if drate == 12 %}checked{% endif %}> Monthly

<input type="radio" name="drate" value="4"
    {% if drate == 4 %}checked{% endif %}> Quarterly
    <br>
            <br>
            <input type="number" id="interest" name="interest" min="0" step="0.01" step="0.01" max="100" class="large-input" value="{{ interest }}">
            <label>%</label>
            <br>
            <br>
            <input type="number" id="time" name="time" min="0" step="0.01" class="large-input" value="{{ time }}">
             <label>years</label>



</div>
</div>

<div class="wox">
    <div class="bluetangle">
            
                <button style="background-color: rgb(3, 19, 113); border-color: rgb(3, 19, 113); color: rgb(255, 255, 255); width: 200px; height: 60px; font-size: 20px;"type="submit">Submit</button>
    </div>

        </div>
        </div>


<div class = "blank"></div>

                    <br>
                       <br>
<div class="bboxp2">
                <p style="color:rgb(0, 0, 0);">Estimate how compound interest grows your savings.</p>
                    <div class="bluetangle"> 
            <p style="color:rgb(255, 255, 255);">Projected Savings in {{time}} years: <br> {{payment}} CAD</p></div></div>

</div>

</div>

</div>
</body>
</html>
