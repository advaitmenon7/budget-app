<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-18" />
    <title>Budget</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/budget.css') }}">
</head>
<body style="background-color:lightgrey;">
    <div class="box">
        <div class="centered-text">
         <p style="color:white; font-size:39px;">Budget Overview</p>

<!-- NAVIGATION (separate, NOT inside form) -->
<div class="button-container">
    <form action="{{ url_for('show_budget') }}" method="POST">
        <button style="border: none; outline: none; color:rgb(3, 9, 113);" type="submit">▶ Budget</button>
    </form>
<form action="{{ url_for('show_simple') }}" method="POST">
        <button style="border: none; outline: none; color:rgb(3, 9, 113);" type="submit">Savings Calculator (Simple)</button>
    </form>
    <form action="{{ url_for('show_goals') }}" method="POST">
        <button style="border: none; outline: none; color:rgb(3, 9, 113);" type="submit">Savings Calculator (Compound)</button>
    </form>
    <form action="{{ url_for('show_mortgage') }}" method="POST">
        <button style="border: none; outline: none; color:rgb(3, 9, 113);" type="submit">Mortgage Calculator</button>
    </form>

</div>

<br>

<!-- ✅ MAIN FORM (ONLY ONE) -->
<form action="{{ url_for('handle_data') }}" method="POST">                   <br>
<div class="wox">
<div class="wiggerbox">
<br>
    <div class="wontainer">

        <div class="gox">
            <label>Gross Monthly Income:</label>
            <br>
            <br>
            <label>Bills:</label>
            <br>
            <br>
            <label>Rent/Mortgage:</label>
            <br>
            <br>
            <label>Food:</label>
            <br>
            <br>
            <label>Transport:</label>
            <br>
            <br>
            <label>Entertainment/Other:</label>
            <br>
            <br>
            <label>Taxes:</label>
            <br>
            <br>
            <label>Savings Contribution:</label>


           </div>
        <div class="gox">
             <input type="number" id="income" name="income" min="000" value="{{ income }}">
             <label>CAD</label>

<br>
<br>
  
            <input type="number" id="bills" name="bills" min="000" value="{{ bills }}">
             <label>CAD</label>

            <br>
            <br>

            <input type="number" id="rent" name="rent" min="000" value="{{ rent }}" >
            <label>CAD</label>
            <br>
            <br>

            <input type="number" id="food" name="food" min="000"  value="{{ food }}"   >
            <label>CAD</label>
            <br>
            <br>

            <input type="number" id="transport" name="transport" min="000"   value="{{ transport }}"  >
            <label>CAD</label>
            <br>
            <br>

            <input type="number" id="fun" name="fun" min="000"  value="{{ fun }}"   > 
            <label>CAD</label>
            <br>
            <br>

            <input type="number" id="taxes" name="taxes" min="000"  value="{{ taxes }}"   >
            <label>CAD</label>
            <br>
            <br>
            <input type="number" id="savings" name="savings" min="000"  value="{{ savings }}"   >
            <label>CAD</label>

<br>
<br>
<br>
<br>

</div>
    </div>
<div class="wox">
    <div class="bluetangle" style="margin-top: 50px;">
                <button style="background-color: rgb(3, 19, 113); border-color: rgb(3, 19, 113); color: rgb(255, 255, 255); width: 200px; height: 60px; font-size: 20px;"type="submit">Submit</button>
</div>
</div>
</div>
<div class = "blank"></div>

                    <br>
                       <br>
<div class="bboxp3">
                <p style="color:rgb(0, 0, 0);">Manage income, expenses, and savings.</p>
                    <div class="bluetangle"> 
            <p style="color:rgb(255, 255, 255);">Income: <br> {{income}} CAD</p></div>
            <br>
         <div class="bluetangle"> 
            <p style="color:rgb(255, 255, 255);">Expenses: {{expenses}} CAD<br>  (incl. saving)s: {{savings}} CAD</p></div>
            <br>
         <div class="bluetangle"> 
            <p style="color:rgb(255, 255, 255);">Remaining Balance: <br> {{tsavings}} CAD</p></div>
        
        </div>

</div>

</div>

</div>
</body>
</html>
